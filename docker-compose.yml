version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: waitlist
      POSTGRES_PASSWORD: waitlist
      POSTGRES_DB: waitlist
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waitlist"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3400:3400"
    environment:
      DATABASE_URL: postgres://waitlist:waitlist@postgres:5432/waitlist
      REDIS_URL: redis://redis:6379
      PORT: 3400
      HOST: 0.0.0.0
      ADMIN_JWT_SECRET: change-me-in-production-min-32-chars
      CORS_ORIGINS: http://localhost:3400,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
